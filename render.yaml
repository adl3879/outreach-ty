services:
  - type: web
    name: outreach-ty-api
    env: node
    rootDir: backend
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma migrate deploy
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: file:./dev.db
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SENDER_NAME
        sync: false
      - key: SENDER_PHONE
        sync: false
      - key: SENDER_PORTFOLIO
        sync: false

  - type: web
    name: outreach-ty
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://outreach-ty-api.onrender.com
